[build]
  base = "astro-site"
  publish = "dist"
  command = "npm run build"


[build.environment]
  NODE_VERSION = "22"

# Headers for security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "max-age=31536000, immutable"

# Cache CSS and JS
[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "max-age=31536000, immutable"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "max-age=31536000, immutable"

# 🚨 旧ドメイン → 新ドメイン リダイレクト
# nankan-analytics.keiba.link/* → https://analytics.keiba.link/:splat
# - 一時的に 302 で運用。完全移行確認後に 301 に切り替える
# - force = true: 既存ファイルがあっても強制的に新ドメインへ飛ばす
# - Netlify Edge は予約パス /.netlify/functions/* を redirects 評価前に
#   内部処理するため、admin tool 経由の POST など functions 呼び出しは
#   そのまま旧ドメインで通る想定
[[redirects]]
  from = "https://nankan-analytics.keiba.link/*"
  to = "https://analytics.keiba.link/:splat"
  status = 302
  force = true